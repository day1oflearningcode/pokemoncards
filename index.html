<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokemon Evolution Chain</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="evolution-chain">

    <div class="card">
      <div class="card-header">
        <span class="hp-badge">39 hp</span>
        <img src="https://www.pokemon.com/static-assets/content-assets/cms2/img/pokedex/full/004.png" alt="Charmander">
      </div>
      
      <div class="card-body">
        <h2 class="card-title">Charmander</h2>
        <span class="type-badge">Fire</span>
        <div class="stats-container">
          <div class="stat-box"><span class="stat-number">52</span><span class="stat-label">Attack</span></div>
          <div class="stat-box"><span class="stat-number">43</span><span class="stat-label">Defense</span></div>
          <div class="stat-box"><span class="stat-number">65</span><span class="stat-label">Speed</span></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="hp-badge">58 HP</span>
        <img src="https://www.pokemon.com/static-assets/content-assets/cms2/img/pokedex/full/005.png" alt="Charmeleon">
      </div>
      <div class="card-body">
        <h2 class="card-title">Charmeleon</h2>
        <span class="type-badge">Fire</span>
        <div class="stats-container">
          <div class="stat-box"><span class="stat-number">64</span><span class="stat-label">Attack</span></div>
          <div class="stat-box"><span class="stat-number">58</span><span class="stat-label">Defense</span></div>
          <div class="stat-box"><span class="stat-number">80</span><span class="stat-label">Speed</span></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="hp-badge">78 HP</span>
        <img src="https://www.pokemon.com/static-assets/content-assets/cms2/img/pokedex/full/006.png" alt="Charizard">
      </div>
      <div class="card-body">
        <h2 class="card-title">Charizard</h2>
        <span class="type-badge">Fire, Flying</span>
        <div class="stats-container">
          <div class="stat-box"><span class="stat-number">84</span><span class="stat-label">Attack</span></div>
          <div class="stat-box"><span class="stat-number">78</span><span class="stat-label">Defense</span></div>
          <div class="stat-box"><span class="stat-number">100</span><span class="stat-label">Speed</span></div>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
